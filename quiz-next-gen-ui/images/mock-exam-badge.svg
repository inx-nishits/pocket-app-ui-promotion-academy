<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="mockMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="45%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="mockBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="mockGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>

  <rect x="1.5" y="1.5" width="61" height="61" rx="15" fill="#0f172a" stroke="#1e293b" />

  <circle cx="32" cy="32" r="21" fill="none" stroke="url(#mockMetal)" stroke-width="2.6" />
  <circle cx="32" cy="32" r="17" fill="#0b1220" stroke="#24324a" stroke-width="1.2" />

  <!-- stopwatch symbol for timed mock exam -->
  <rect x="29.4" y="17.5" width="5.2" height="3" rx="1" fill="url(#mockMetal)" />
  <path d="M42.5 22.5l2.4 2.4" stroke="url(#mockMetal)" stroke-width="2.4" stroke-linecap="round" />
  <circle cx="32" cy="33.5" r="11.5" fill="none" stroke="url(#mockBlue)" stroke-width="2.6" />
  <circle cx="32" cy="33.5" r="8.6" fill="#101c33" />
  <!-- tick marks -->
  <path d="M32 26.4v1.8M32 38.8v1.8M39.1 33.5h-1.8M26.7 33.5h-1.8" stroke="#7dd3fc" stroke-width="1.4" stroke-linecap="round" />
  <!-- hands -->
