<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
        <linearGradient id="silverStar" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="40%" stop-color="#e2e8f0" />
            <stop offset="70%" stop-color="#94a3b8" />
            <stop offset="100%" stop-color="#475569" />
        </linearGradient>
        <linearGradient id="silverInner" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#94a3b8" />
            <stop offset="100%" stop-color="#ffffff" />
        </linearGradient>
        <radialGradient id="blueCenter" cx="50%" cy="50%" r="50%">
            <stop offset="60%" stop-color="#1e40af" />
            <stop offset="100%" stop-color="#1e3a8a" />
        </radialGradient>
        <g id="starPoint">
            <polygon points="32,6 37.5,21 32,17 26.5,21" fill="url(#silverStar)" />
            <polygon points="32,6 37.5,21 32,17" fill="#ffffff" opacity="0.6" />
        </g>
    </defs>
    <rect width="64" height="64" rx="16" fill="#0f172a" />
    <g>
        <use href="#starPoint" />
        <use href="#starPoint" transform="rotate(45, 32, 32)" />
        <use href="#starPoint" transform="rotate(90, 32, 32)" />
        <use href="#starPoint" transform="rotate(135, 32, 32)" />
        <use href="#starPoint" transform="rotate(180, 32, 32)" />
        <use href="#starPoint" transform="rotate(225, 32, 32)" />
        <use href="#starPoint" transform="rotate(270, 32, 32)" />
        <use href="#starPoint" transform="rotate(315, 32, 32)" />
    </g>
    <circle cx="32" cy="32" r="14" fill="url(#silverStar)" />
    <circle cx="32" cy="32" r="11" fill="#0f172a" />
    <path d="M 32 22 A 10 10 0 1 1 31.9 22" stroke="url(#silverInner)" stroke-width="1.5" stroke-dasharray="2.5 1.5" fill="none" />
    <circle cx="32" cy="32" r="7.5" fill="url(#blueCenter)" />
    <circle cx="32" cy="29.5" r="1.5" fill="#fbbf24" />
    <circle cx="29.5" cy="34" r="1.5" fill="#fbbf24" />
    <circle cx="34.5" cy="34" r="1.5" fill="#fbbf24" />
</svg>
