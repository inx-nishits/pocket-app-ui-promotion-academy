<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
        <!-- Bright vibrant lens -->
        <radialGradient id="lensGrad" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="#bfdbfe"/>
            <stop offset="40%" stop-color="#60a5fa"/>
            <stop offset="100%" stop-color="#1d4ed8"/>
        </radialGradient>
        <!-- Bright metallic rim -->
        <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="35%" stop-color="#cbd5e1"/>
            <stop offset="100%" stop-color="#64748b"/>
        </linearGradient>
        <!-- Warm gold handle for contrast -->
        <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fde68a"/>
            <stop offset="40%" stop-color="#f59e0b"/>
            <stop offset="100%" stop-color="#92400e"/>
        </linearGradient>
    </defs>

    <!-- Dark background -->
    <rect width="64" height="64" rx="16" fill="#0f172a"/>

    <!-- Handle shadow -->
    <line x1="40" y1="40" x2="54" y2="54" stroke="#000000" stroke-width="9" stroke-linecap="round" opacity="0.6"/>
    <!-- Handle body (gold/amber for warmth contrast) -->
    <line x1="40" y1="40" x2="54" y2="54" stroke="url(#handleGrad)" stroke-width="6.5" stroke-linecap="round"/>
    <!-- Handle highlight -->
    <line x1="40" y1="40" x2="50" y2="50" stroke="#fef9c3" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

    <!-- Connector knuckle -->
    <circle cx="38.5" cy="38.5" r="5" fill="url(#rimGrad)"/>
    <circle cx="38.5" cy="38.5" r="2.2" fill="#0f172a"/>

    <!-- Outer glow ring -->
    <circle cx="25" cy="25" r="17.5" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>

    <!-- Outer rim shadow -->
    <circle cx="25" cy="25" r="17" fill="none" stroke="#0f172a" stroke-width="6"/>
    <!-- Bright metallic rim -->
    <circle cx="25" cy="25" r="16.5" fill="none" stroke="url(#rimGrad)" stroke-width="5"/>
    <!-- Inner rim edge -->
    <circle cx="25" cy="25" r="13.8" fill="none" stroke="#93c5fd" stroke-width="0.8" opacity="0.6"/>

    <!-- Bright lens fill -->
    <circle cx="25" cy="25" r="13.5" fill="url(#lensGrad)"/>

    <!-- Large bold reflection arc -->
    <path d="M 15 19 A 12 12 0 0 1 22 13" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Small secondary reflection -->
    <ellipse cx="30" cy="19" rx="2.5" ry="1.5" fill="#ffffff" opacity="0.7" transform="rotate(-30, 30, 19)"/>
    <!-- Tiny sparkle dot -->
    <circle cx="33" cy="24" r="1.2" fill="#ffffff" opacity="0.5"/>
</svg>
